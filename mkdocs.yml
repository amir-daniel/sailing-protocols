site_name: Sailing Protocols — Sailing Checklists
site_description: A structured library of sailing checklists and protocols.
site_author: amir-daniel
site_url: https://amir-daniel.github.io/sailing-protocols/
repo_url: https://github.com/amir-daniel/sailing-protocols
repo_name: amir-daniel/sailing-protocols

# Keep the Markdown files exactly where they are (repo root) and use README.md
# as the home page. Provided by the mkdocs-same-dir plugin.
docs_dir: .

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.top           # back-to-top button
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - same-dir          # lets docs_dir be the repo root, README.md as index
  - offline           # builds a fully offline-capable site (PWA-like)

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true          # nice rendered checkboxes
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amir-daniel/sailing-protocols

